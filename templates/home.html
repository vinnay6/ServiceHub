<!DOCTYPE html>
<html>
<head>
    <title>ServiceHub</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            width: 350px;
        }

        h2 {
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 30px;
            font-weight: 300;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        .primary {
            background: white;
            color: #2563eb;
        }

        .primary:hover {
            background: #e5e7eb;
        }

        .outline {
            background: transparent;
            border: 1px solid white;
            color: white;
        }

        .outline:hover {
            background: white;
            color: #2563eb;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Welcome to ServiceHub</h2>
    <p>Select your role to continue</p>

    <a href="/select-location">
        <button class="btn primary">Browse Services</button>
    </a>

    <a href="/customer-login">
        <button class="btn outline">Login as Customer</button>
    </a>

    <a href="/login">
        <button class="btn outline">Login as Provider</button>
    </a>

    <a href="/onboard">
        <button class="btn primary">Register as Provider</button>
    </a>
</div>

</body>
</html>
