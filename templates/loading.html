<!DOCTYPE html>
<html>
<head>
<title>Finding Services</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#667eea,#764ba2);
color:white;
overflow:hidden;
}

/* circle pulse */

.circle{
position:absolute;
width:140px;
height:140px;
border-radius:50%;
background:rgba(255,255,255,0.15);
animation:pulse 2s infinite;
}

.circle:nth-child(2){
animation-delay:.5s;
}

.circle:nth-child(3){
animation-delay:1s;
}

@keyframes pulse{

0%{
transform:scale(.5);
opacity:1;
}

100%{
transform:scale(2);
opacity:0;
}

}

/* location pin */

.pin{
font-size:65px;
z-index:2;
animation:jump 1s infinite ease-in-out;
}

@keyframes jump{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-20px);
}

100%{
transform:translateY(0);
}

}

/* text */

h2{
margin-top:30px;
font-weight:600;
letter-spacing:1px;
}

/* loading dots */

.loading{
margin-top:10px;
font-size:18px;
}

.dot{
animation:blink 1.5s infinite;
}

.dot:nth-child(2){
animation-delay:.2s;
}

.dot:nth-child(3){
animation-delay:.4s;
}

@keyframes blink{

0%,80%,100%{
opacity:0;
}

40%{
opacity:1;
}

}

</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="pin">📍</div>

<h2>Finding services in your city</h2>

<div class="loading">
<span class="dot">.</span>
<span class="dot">.</span>
<span class="dot">.</span>
</div>

<script>

setTimeout(function(){
window.location.href="/services";
},3000)

</script>

</body>
</html>
